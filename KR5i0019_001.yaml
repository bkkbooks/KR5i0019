front:
  text: 高上玉皇心印經心印經序空洞道人心印經註成頤翁三讀之喟然而嘆曰大哉心乎宇宙之謂與萬靈之府虛無之谷不可以起滅識而起滅無不在者也妙哉印乎契劵之謂與交易之門神明之宗不可以操舎計而操舎無不由者也夫以一心而内攝精氣神則精氣神莫非心也以一心而外矚斗日月斗日月莫非心也以斗日月近之而精氣神以精氣神遠之而斗日月無事乎引而若引也無事乎推而若推也内之外之上之下之泛泛乎如在左右恍恍乎如啟戸牖寂然而應響曉然而流光昬然而不知其所以極印在斯乎帝之所以凝神統化而爲萬物造命定性者也空洞子有見於是故直指水竅光神之密而以風波相㳫寓其象夫月到天心風來水面天地精神之至也堯夫邵子得意於其間故樂至於無可奈何夫樂則生矣樂至於無可奈何則生無其生而亦不能死矣此空洞子拈花處也讀者參之高上玉皇心印經
  hash: sha256:91afe5b176441440bcd1967b16ea07e8b0c3d4dbe68edcff368e3cd488dbcd7a
