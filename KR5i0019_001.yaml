body:
  text: 蜀抱真子注上藥三品神與氣精修仙者採藥以煉丹還丹而合道其初必先明藥品上藥大藥也道生一一生二二生三三者萬物之真數故藥品以三神元神氣元氣精元精元神君思慮神元氣母呼吸氣元精長交感精其在天神象日氣象斗精象月在地神法火氣法土精法水在人神載性氣載情精載命神浮而精沉氣居浮沉之間恍恍惚惚杳杳冥冥道德經曰道之為物惟恍惟惚又曰杳杳冥冥其中有精恍惚者神氣之樞旋杳冥者真精之胎藴此合三為一乃太極之根先天之宰所謂從道妙一孕玄分元日月之所由判天地之所由生也存無守有頃刻而成道德經云無名天地之始有名萬物之母始即道神之所由君也母即德也氣之所由根也契云上德無為不以察求下德為之其用不休傳明之曰上閉則稱有下閉則稱無無者易空有者易物存則空生守則物化顚倒之則竅妙同玄有無相入頃刻者候中之候此化三歸一鍊精而作地仙之道也回風渾合百日功靈風者天之號令氣巽始於無形於有候於黃鐘吹灰乘於水火土木返之曰回風遇火則疾可以鼓火可以滅火鼓火之風順滅火之風逆遇土則寂可以燥土可以潤土遇木則匹可以散木可以拔木遇水則激可以漲水可以竭水回風則火木土水俱回而生金渾合者一也如水風相遭波在風中風在波中豈非金水合處之妙哉百日氣完基固此鍊氣而結胎仙之道也默朝上帝一紀飛升上帝居高上洞元即契所謂上有神明居也朝者以下奉上復初返元之意默者回光襲明一紀者十二年極月數也飛升則移居上苑此鍊神而化飛仙之道也行之三乘以漸道則一也知者易悟昧者難行道本無難易知行亦無二致而人之智愚分焉知者返求諸己而徵於天地時物故易悟昧者馳心於外而蔽於愛欲故難行履踐天光呼吸育淸履者循其跡踐者步其紀天不自光以日月星為光循其跡則日有昏曉月有弦望星有建次所以觀天也步其紀則迎日推月合辰所以執天也履踐有順有逆順者人即地以法天逆者人契道以先天並行一致者也呼吸者息也呼則闢吸則合呼吸之間一生焉淸者天之一即光之根也動物之生恃乎息息者人得天之一以人一養天一光風相搏而道居焉出玄入牝若亡若存以其分而言之玄天牝地出也以為入入也以為出以其合而言之玄牝一而已出入有無同門合化存亡一其候若者其象其物之真綿綿不絶固蒂深根獨往獨來無有斷際柔若水剛若金道之自然其妙如此花有蒂蒂在上樹有根根在下固蒂深根精神水火歸一之地也人各有精精合其神易曰男女搆精萬物化生人秉乾坤之真一以生精雖藏而不見乃為妙有生本世人以妄想感之順而成人不知先天真壬即含於癸所謂上善若水淸而無瑕者是也知其時因其動而制之使沉者就浮以合於神則壬丙相交鉛投汞矣神合其氣氣合體真神無而氣有神靈而氣動人以神為神斯墮於夢想能反觀焉則有無合靈動交而神化致一神回則明氣定則變明者有象變者有物也神合其氣吾見其明以變又孰知物以象乎體者人之形質宅氣之府息以踵則大氣符妙氣妙氣生真氣故體亦真不得其真皆是强名名所以表真法於自然者也失真則名不立神能入石神能飛形石金類形屬土石至頑而含金玉形塊然而化光明皆神為之自外淪內曰入自伏之舉曰飛易曰神也者妙萬物而為言者也入水不溺入火不焚水火一神而已水能溺其非水者而不能溺水火能焚其非火者而不能焚火入則渾然而一一則道神依形生精依氣盈形為器形者神之舍氣為母精者氣之子邵子曰天依地易曰日月得天而能久照相依則互用互生顚倒循環無有窮極不雕不殘松柏靑靑木德之厚者松柏人靑帝之所始化也木類也能返朴則受氣足如松柏靑靑而長春三品一理妙不可聽神氣精自道言之本一自藥言之有三三一其理可稽以神為主者則鍊精氣以還元神以氣為主者則煉神精以還元氣以精為主者則鍊神氣以還元精曰三元三性三家三丹之說悉本於此分而為六候陳而為九鼎序而為八十一之火符其實一而已一即神也即精也即氣也即元也即丹也即道也此元始以一音流轉者也道不能無言有言皆明三三數無盡言三則萬生得三忘三則知一知一妙一言無可言言復無聲何可聽其聚則有其散則零得一聚三則有失三散一則零聖人逆而聚之常人順而散之聖人以無為聚故有衆人以執而散故零七竅相通竅竅光明七竅皆居首為載陽之器火數七眼耳口鼻四而竅七火體金用而水注之者也水即精也金即氣也火即神也生之來謂之精水為元即玄也竅即牝也而火金之用行焉火金者日月之體光明之主也火光而金明玄牝之門在焉相通則天門開七竅為一而淸玄育故道立焉聖日聖月照耀金庭日月者乾坤之至精聖日聖月者坎離之真光道主之天地不得而私有之者也金庭即黃庭天之黃道也日月行中而合符化金耀於其庭焉一得永得自然身輕呂祖曰天地三才人得一既得一永無失蓋以三致一一得則永得矣以一鍊百骸百骸無不一鍊一化一斯化形仙矣太和充溢骨散寒瓊太和元氣自中達外無不充溢所謂黃中通理潤澤達肌膚也得丹則靈不得則傾丹者金火之妙用火性能鍊金能消金善用火者金火相伏食而還靈不善用火者火焚金而命失愼哉丹在身中非白非靑白金色靑木色丹由金木併一則金木兩忘無色可指金剛經云以色相見我以聲音求我是人行邪道不得見如來誦持萬遍妙理自明大丹賦曰千周燦彬彬萬遍將可覩道妙心明轉經自得可也
